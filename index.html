<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>名刺ギャラリー｜7/11集中講義Codex編</title>
<style>
  :root {
    --bg: #f7f6f3;
    --card-bg: #ffffff;
    --border: #e3e0da;
    --text-main: #2b2926;
    --text-sub: #7a7568;
    --accent: #a67c52;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text-main);
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
    line-height: 1.8;
  }
  header {
    padding: 48px 24px 32px;
    text-align: center;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin: 0 0 12px;
    letter-spacing: 0.02em;
  }
  header p {
    margin: 4px 0;
    color: var(--text-sub);
    font-size: 0.92rem;
  }
  header .count {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 14px;
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 999px;
    font-size: 0.85rem;
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 64px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin: 0;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .card:hover {
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .card-images {
    display: flex;
    gap: 8px;
  }
  .card-images img {
    width: 50%;
    aspect-ratio: 16 / 9;
    object-fit: contain;
    background: #fafafa;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: zoom-in;
  }
  .card figcaption {
    margin-top: 10px;
    font-size: 0.88rem;
    text-align: center;
    color: var(--text-main);
    word-break: break-word;
  }
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,18,15,0.86);
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: zoom-out;
    padding: 24px;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 6px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  footer {
    text-align: center;
    padding: 24px;
    color: var(--text-sub);
    font-size: 0.8rem;
  }
  @media (max-width: 480px) {
    header { padding: 36px 16px 24px; }
    main { padding: 0 16px 48px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
  }
</style>
</head>

<script>
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeLightbox();
  });
</script>
